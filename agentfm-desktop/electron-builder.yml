appId: net.agentfm.desktop
productName: AgentFM
directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

# The backend binaries ship ONCE, under Resources/bin/, which is what
# backend-manager.ts resolves at runtime. They are deliberately NOT in
# `files`/asar (that copy was never read and doubled the installer size).
extraResources:
  - from: resources
    to: bin
    filter:
      - "agentfm-*"
  - from: build/icon.png
    to: build/icon.png

asar: true

# With identity: null electron-builder skips signing entirely, which leaves the
# repacked bundle carrying Electron's original (now-invalid) seal — quarantined
# downloads then hit Gatekeeper's dead-end "damaged" dialog. Until a Developer
# ID exists, re-sign the final bundle ad-hoc so the signature is at least
# valid and users get the bypassable "unverified developer" flow instead.
afterPack: scripts/adhoc-sign.cjs

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: build/icon.icns
  hardenedRuntime: false
  identity: null      # no notarization for v1
  gatekeeperAssess: false

linux:
  target:
    - AppImage
  category: Development
  icon: build/icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

# No auto-updater is wired up (electron-updater is not a dependency), so there
# is no publish block. Add one with a real owner/repo when releases are wired.
