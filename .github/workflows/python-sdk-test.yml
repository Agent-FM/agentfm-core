name: python-sdk-test

on:
  push:
    branches: [main]
    paths:
      - "agentfm-python/**"
      - ".github/workflows/python-sdk-test.yml"
  pull_request:
    paths:
      - "agentfm-python/**"
      - ".github/workflows/python-sdk-test.yml"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: agentfm-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: agentfm-python/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src/ tests/
      - name: Type-check (mypy)
        run: mypy src/agentfm/
      - name: Test
        run: pytest --cov=agentfm --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: agentfm-python/coverage.xml
