name: desktop-windows-build

on:
  workflow_dispatch:
  push:
    tags:
      - "agentfm-desktop-v*"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: agentfm-desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agentfm-go/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Windows backend binary
        working-directory: agentfm-go
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
        run: |
          mkdir -p ../agentfm-desktop/resources
          go build -trimpath -ldflags="-s -w" -o ../agentfm-desktop/resources/agentfm-windows-amd64.exe ./cmd/agentfm

      - name: Install desktop deps
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      - name: Build NSIS installer
        run: npx electron-builder --win nsis --x64

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: agentfm-windows-installer
          path: agentfm-desktop/dist/*.exe
